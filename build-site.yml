name: Build site

# Builds amdumdee.com. Clones the threat-intel data repo at build time and
# renders it into /threat-intel. Add more clone steps here as the practice
# grows to new data repos — the landing page and structure stay the same.

on:
  push:
    branches: [ main ]            # rebuild when the site repo itself changes
  workflow_dispatch:              # manual trigger from the Actions tab
  repository_dispatch:            # triggered by the data repo when new reports land
    types: [ content-updated ]
  schedule:
    - cron: '0 6 * * *'           # safety net: rebuild daily at 06:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Clone threat-intel data repo
        run: |
          rm -rf _data/global-threat-intel
          git clone --depth 1 https://github.com/AmDumDee/global-threat-intel _data/global-threat-intel
          # future data repos: add more clones here, e.g.
          # git clone --depth 1 https://github.com/AmDumDee/<next-repo> _data/<next-repo>

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build site
        run: python3 build_site.py

      - name: Commit built site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf _data                      # don't commit the cloned data
          git add threat-intel/index.html sitemap.xml llms.txt
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "build: rebuild site [skip ci]"
            git push
          fi
